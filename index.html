<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: #fff2cc;
    color: #ff00ff;
    height: 100vh;
    overflow: hidden;
}

.container {
    position: relative;
    width: 100%;
    height: 100%;
}

/* TEXTO */
.text {
    position: absolute;
    font-size: 18px;
}

.t2 {
    top: 20%;
    left: 10%;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.t2.visible {
    opacity: 1;
}

/* LINKS */
a {
    color: #ff00ff;
    position: absolute;
    text-decoration: none;
}

.l1 { top: 30%; left: 10%; }
.l2 { top: 35%; left: 10%; }
.l3 { top: 40%; left: 10%; }

/* PLAYER */
.player {
    position: absolute;
    top: 20%;
    left: 40%;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.player.show {
    opacity: 1;
}
</style>

</head>

<body>

<div class="container">

    <!-- TEXTO ESCONDIDO -->
    <div class="text t2">
        escrita, música e multimedia.<br><br>
        curiosa pelo absurdo, de lupa no lixo e no luxo.<br><br>
        entre os espectros.<br><br> nasceu e vive em Lisboa.
    </div>

    <!-- LINKS -->
    <a class="l1" href="#" id="aboutLink">about</a>
    <a class="l2" href="#" id="musicLink">music</a>
    <a class="l3" href="#">writing</a>

    <!-- PLAYER -->
    <div class="player" id="musicPlayer">
        <iframe 
            style="border: 0; width: 350px; height: 787px;" 
            src="https://bandcamp.com/EmbeddedPlayer/album=2924040545/size=large/bgcol=ffffff/linkcol=de270f/package=3588089395/transparent=true/" 
            seamless>
        </iframe>
    </div>

</div>

<script>
// ABOUT
document.getElementById("aboutLink").addEventListener("click", function(e) {
    e.preventDefault();
    document.querySelector(".t2").classList.toggle("visible");
});

// MUSIC
document.getElementById("musicLink").addEventListener("click", function(e) {
    e.preventDefault();
    document.getElementById("musicPlayer").classList.toggle("show");
});
</script>

</body>
</html>
