<!DOCTYPE html>
<html lang="en">
<body>
    <div class="container">
        <!-- Left Column (Navigation) -->
        <div class="left-column">
            <h2 class="name"><a href="/">catiasa.com</a></h2>
            <div class="nav-links">
                <a href="/art">art</a>
                <a href="/music">music</a>
                <a href="/writing">writing</a>
                <a href="/about">about</a>
            </div>
        </div>
        
        <!-- Right Column (Images with captions) -->
        <div class="right-column">
            <div class="media-item">
                <img src="https://editoraurutau.com/wp-content/uploads/2026/02/CS_capa_web-600x876.jpg" alt="Parir montanhas">
            </div>
            <div class="caption">
                <p>Parir montanhas - Cátia Sá</p>
            </div>
            
            <a href="https://catiasa.bandcamp.com/album/da-barriga" target="_blank" class="bandcamp-link">
                🎵 Listen on Bandcamp
            </a>
            
            <!-- Music Section -->
            <div class="music-section">
                <div class="player-container">
                    <iframe 
                        style="border: 0; width: 350px; height: 787px;" 
                        src="https://bandcamp.com/EmbeddedPlayer/album=2924040545/size=large/bgcol=ffffff/linkcol=0687f5/package=3588089395/transparent=true/" 
                        seamless>
                        <a href="https://catiasa.bandcamp.com/album/da-barriga">DA BARRIGA by Cátia Sá</a>
                    </iframe>
                    <iframe 
                        style="border: 0; width: 350px; height: 152px;" 
                        src="https://w.soundcloud.com/player/?url=https://soundcloud.com/catia_sa&amp;show_comments=true&amp;show_teaser=true&amp;show_playcount=true&amp;show_artwork=true&amp;color=0687f5&amp;auto_play=false">
                    </iframe>
                </div>
            </div>
            
            <!-- Writing Section -->
            <div class="writing-section">
                <a href="https://editoraurutau.com/titulo/parir-montanhas" target="_blank" class="writing-link">
                    Read "Parir Montanhas"
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Toggle full caption visibility on click
            const mediaItems = document.querySelectorAll('.media-item');
            mediaItems.forEach(item => {
                item.addEventListener('click', () => {
                    const caption = item.nextElementSibling;
                    caption.classList.toggle('visible');
                });
            });
        });
    </script>
</body>
</html>
